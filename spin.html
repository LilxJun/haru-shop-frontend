<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mở Hòm May Mắn - Haru Shop</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/header-footer.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .csgo-page-main {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 85vh;
            background-color: #121212;
            background-image: radial-gradient(circle, #2a2a35 0%, #121212 100%);
            padding: 40px 20px;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .csgo-title {
            color: #ffcc00;
            font-size: 36px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(255, 204, 0, 0.5);
        }

        .csgo-desc {
            color: #94a3b8;
            margin-bottom: 40px;
            font-style: italic;
        }

        /* KHUNG CHỨA HÒM CSGO */
        .csgo-container {
            width: 100%;
            max-width: 900px;
            height: 180px;
            background: #1e1e26;
            border: 2px solid #333;
            border-radius: 8px;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.8);
            margin-bottom: 30px;
        }

        /* VẠCH VÀNG Ở GIỮA (KIM CHỈ NAM) */
        .csgo-center-line {
            position: absolute;
            top: 0;
            bottom: 0;
            left: 50%;
            width: 2px;
            background: #ffcc00;
            z-index: 10;
            transform: translateX(-50%);
            box-shadow: 0 0 10px #ffcc00;
        }

        .csgo-arrow-up {
            position: absolute;
            bottom: 0;
            left: 50%;
            z-index: 11;
            transform: translateX(-50%);
            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
            border-bottom: 15px solid #ffcc00;
        }

        .csgo-arrow-down {
            position: absolute;
            top: 0;
            left: 50%;
            z-index: 11;
            transform: translateX(-50%);
            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
            border-top: 15px solid #ffcc00;
        }

        /* DẢI TRƯỢT CHỨA VẬT PHẨM */
        .csgo-tracker {
            display: flex;
            height: 100%;
            width: max-content;
            transform: translateX(0);
            /* Transition này quyết định độ mượt chậm dần của vòng quay (thời gian 6s) */
            transition: transform 6s cubic-bezier(0.15, 0.9, 0.25, 1);
        }

        /* TỪNG Ô VẬT PHẨM */
        .csgo-item {
            width: 150px;
            height: 160px;
            margin: 10px 5px;
            background: #2a2a35;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 4px;
            border-bottom: 6px solid #4b69ff;
            /* Màu mặc định (Xanh) */
            box-sizing: border-box;
            text-align: center;
            padding: 10px;
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.3);
        }

        .csgo-item img {
            width: 60px;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.2));
        }

        .csgo-item span {
            font-size: 14px;
            font-weight: bold;
            color: #fff;
        }

        .btn-open {
            background: #ffcc00;
            color: #121212;
            border: none;
            padding: 15px 50px;
            font-size: 20px;
            font-weight: 900;
            text-transform: uppercase;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 15px rgba(255, 204, 0, 0.4);
        }

        .btn-open:hover {
            background: #ffd633;
            transform: scale(1.05);
        }

        .btn-open:disabled {
            background: #444;
            color: #888;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* BẢNG KẾT QUẢ HIỆN LÊN SAU KHI QUAY XONG */
        .result-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            background: rgba(20, 20, 30, 0.95);
            border: 2px solid #ffcc00;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            z-index: 100;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
            opacity: 0;
            visibility: hidden;
            transition: 0.4s ease;
        }

        .result-panel.show {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) scale(1);
        }

        .result-panel h3 {
            margin-top: 0;
            color: #ffcc00;
            font-size: 28px;
        }

        .prize-code {
            display: inline-block;
            background: #000;
            padding: 10px 20px;
            border: 1px dashed #ffcc00;
            color: #fff;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 3px;
            margin: 15px 0;
        }

        .overlay-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 99;
            opacity: 0;
            visibility: hidden;
            transition: 0.4s;
        }

        .overlay-bg.show {
            opacity: 1;
            visibility: visible;
        }
    </style>
</head>

<body class="homepage">
    <!-- HEADER -->
    <header class="main-header">
        <div class="header-left">
            <div class="logo"><a href="index.html">Haru</a></div>
        </div>
        <nav class="header-nav">
            <div class="nav-close-btn"><i class="fas fa-times"></i></div>
            <ul>
                <li><a href="index.html">TRANG CHỦ</a></li>
                <li><a href="mice.html">CHUỘT</a></li>
                <li><a href="keyboard.html">BÀN PHÍM</a></li>
            </ul>
        </nav>
        <div class="header-right">
            <div class="Icon-NguoiDung">
                <a href="#" class="header-icon-link"><i class="fas fa-search"></i></a>
                <div class="user-menu-container" id="user-menu-logged-out">
                    <a href="login.html" class="header-icon-link"><i class="fas fa-user"></i></a>
                </div>
                <div class="user-menu-container" id="user-menu-logged-in" style="display: none;">
                    <a href="profile.html" class="header-icon-link" id="current-username">...</a>
                    <div class="user-dropdown-menu">
                        <a href="profile.html" class="dropdown-item">Tài khoản</a>
                        <a href="#" class="dropdown-item" id="logout-button">Đăng xuất</a>
                    </div>
                </div>
                <a href="cart.html" class="header-icon-link"><i class="fas fa-shopping-cart"></i></a>
            </div>
        </div>
    </header>

    <!-- GIAO DIỆN HÒM CSGO -->
    <main class="csgo-page-main">
        <h2 class="csgo-title">MỞ HÒM TIẾP TẾ</h2>
        <p class="csgo-desc">Mỗi tài khoản được mở 1 hòm duy nhất. Độ hiếm vật phẩm phân loại theo màu sắc (Xanh > Tím >
            Hồng > Đỏ).</p>

        <div class="csgo-container" id="csgo-container">
            <div class="csgo-arrow-down"></div>
            <div class="csgo-center-line"></div>
            <div class="csgo-arrow-up"></div>

            <div class="csgo-tracker" id="csgo-tracker">
                <!-- Javascript sẽ tự động nhồi 80 cái card quà tặng vào đây -->
            </div>
        </div>

        <button id="btn-open" class="btn-open" onclick="openCase()">MỞ HÒM NGAY</button>
    </main>

    <!-- POPUP KẾT QUẢ -->
    <div class="overlay-bg" id="overlay"></div>
    <div class="result-panel" id="result-panel">
        <div id="result-content"></div>
        <button onclick="closeModal()" class="btn-open"
            style="font-size: 14px; padding: 10px 20px; margin-top: 20px;">Đóng</button>
    </div>

    <!-- SCRIPTS -->
    <script src="js/header.js"></script>

    <script>
        const tracker = document.getElementById('csgo-tracker');
        const container = document.getElementById('csgo-container');

        // Data giả lập để vẽ dải trượt (Giống Skin súng)
        const prizePool = [
            { name: 'Voucher giảm 20%', color: '#eb4b4b', icon: 'fas fa-ticket-alt' }, // Covert (Đỏ) - Cực hiếm
            { name: 'Voucher giảm 10%', color: '#d32ce6', icon: 'fas fa-tags' },       // Classified (Hồng) - Hiếm
            { name: 'Voucher giảm 5%', color: '#8847ff', icon: 'fas fa-tag' },         // Restricted (Tím) - Khá
            { name: 'Chúc bạn may mắn lần sau', color: '#4b69ff', icon: 'far fa-sad-tear' } // Mil-Spec (Xanh) - Phổ biến
        ];

        // 1. HÀM VẼ DẢI TRƯỢT 80 Ô (TẠO ẢO ẢNH DÀI VÔ TẬN)
        function initTracker() {
            tracker.innerHTML = '';
            for (let i = 0; i < 80; i++) {
                // Random ra màu giả để làm mồi
                let randomPrize = prizePool[Math.floor(Math.random() * prizePool.length)];
                tracker.innerHTML += `
                    <div class="csgo-item" style="border-bottom-color: ${randomPrize.color}">
                        <i class="${randomPrize.icon}" style="font-size: 30px; color: ${randomPrize.color}; margin-bottom: 10px;"></i>
                        <span>${randomPrize.name}</span>
                    </div>
                `;
            }
        }
        initTracker();

        // 2. HÀM QUAY XỔ SỐ
        async function openCase() {
            const btn = document.getElementById('btn-open');
            if (btn.disabled) return;

            let email = null;
            try {
                const currentUserJSON = localStorage.getItem('haru-current-user');
                if (currentUserJSON) email = JSON.parse(currentUserJSON).email;
            } catch (e) {
                email = localStorage.getItem('user_email');
            }

            if (!email) {
                alert("Bạn phải đăng nhập để nhận chìa khóa mở hòm!");
                window.location.href = 'login.html';
                return;
            }

            btn.disabled = true;
            btn.innerHTML = 'ĐANG MỞ KHÓA...';

            try {
                // GỌI API ĐỂ BIẾT TRƯỚC KẾT QUẢ TỪ BACKEND
                const res = await fetch('https://haru-shop-backend-production-188a.up.railway.app/api/spin', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email })
                });
                const data = await res.json();

                if (!res.ok) {
                    alert(data.error);
                    btn.innerHTML = 'MỞ HÒM NGAY';
                    return;
                }

                // CHÈN KẾT QUẢ THẬT VÀO VỊ TRÍ SỐ 60 TRÊN DẢI TRƯỢT
                const targetIndex = 60;
                let actualColor = '#4b69ff'; // Xanh mặc định
                let actualIcon = 'far fa-sad-tear';

                if (data.prize.includes('20%')) { actualColor = '#eb4b4b'; actualIcon = 'fas fa-ticket-alt'; }
                else if (data.prize.includes('10%')) { actualColor = '#d32ce6'; actualIcon = 'fas fa-tags'; }
                else if (data.prize.includes('5%')) { actualColor = '#8847ff'; actualIcon = 'fas fa-tag'; }

                // Can thiệp DOM để sửa ô số 60 thành quà API trả về
                const items = tracker.querySelectorAll('.csgo-item');
                items[targetIndex].style.borderBottomColor = actualColor;
                items[targetIndex].innerHTML = `
                    <i class="${actualIcon}" style="font-size: 30px; color: ${actualColor}; margin-bottom: 10px;"></i>
                    <span>${data.prize}</span>
                `;

                // TÍNH TOÁN KHOẢNG CÁCH TRƯỢT (TOÁN HỌC)
                const itemWidth = 160; // 150px width + 10px margin
                const containerCenter = container.offsetWidth / 2;

                // Random lệch +- 60px để kim không luôn nằm giữa chính xác (tạo cảm giác hồi hộp như thật)
                const randomOffset = Math.floor(Math.random() * 120) - 60;

                // Công thức: Dịch track sang trái = (Vị trí ô 60) + (Nửa ô 60) - (Nửa khung) + lệch
                const shiftX = (targetIndex * itemWidth) + (itemWidth / 2) - containerCenter + randomOffset;

                // THỰC THI ANIMATION TRƯỢT
                tracker.style.transform = `translateX(-${shiftX}px)`;

                // Đợi 6.5s cho animation chạy xong rồi hiện Popup
                setTimeout(() => {
                    const resultPanel = document.getElementById('result-panel');
                    const resultContent = document.getElementById('result-content');
                    const overlay = document.getElementById('overlay');

                    if (data.code) {
                        resultContent.innerHTML = `
                            <h3>🎉 TRÚNG THƯỞNG 🎉</h3>
                            <p style="color: ${actualColor}; font-size: 20px; font-weight: bold;">${data.prize}</p>
                            <span class="prize-code">${data.code}</span>
                            <p style="color: #94a3b8; font-size: 14px;">Mã đã được lưu vào hệ thống, áp dụng khi Thanh toán.</p>
                        `;
                    } else {
                        resultContent.innerHTML = `
                            <h3 style="color: #4b69ff;">RẤT TIẾC</h3>
                            <i class="${actualIcon}" style="font-size: 50px; color: #4b69ff; margin: 15px 0;"></i>
                            <p style="color: #fff; font-size: 18px;">${data.prize}</p>
                        `;
                    }

                    overlay.classList.add('show');
                    resultPanel.classList.add('show');
                    btn.innerHTML = 'ĐÃ MỞ';

                }, 6500);

            } catch (err) {
                btn.disabled = false;
                btn.innerHTML = 'MỞ HÒM NGAY';
                alert("Lỗi kết nối API!");
            }
        }

        function closeModal() {
            document.getElementById('overlay').classList.remove('show');
            document.getElementById('result-panel').classList.remove('show');
        }
    </script>
</body>

</html>

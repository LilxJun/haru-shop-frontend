<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Haru Shop - Vòng Quay May Mắn</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: #0d0d0d;
            color: #fff;
            text-align: center;
            font-family: Arial, sans-serif;
        }

        .giveaway-container {
            max-width: 600px;
            margin: 50px auto;
            padding: 30px;
            background: #1a1a1a;
            border: 1px solid #d4af37;
            border-radius: 10px;
        }

        .prize-box {
            font-size: 24px;
            font-weight: bold;
            color: #d4af37;
            padding: 40px;
            border: 2px dashed #333;
            margin: 20px 0;
            background: #000;
            transition: all 0.1s;
        }

        .spin-btn {
            background: #d4af37;
            color: #000;
            font-size: 20px;
            font-weight: bold;
            padding: 15px 40px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-transform: uppercase;
        }

        .spin-btn:hover {
            background: #f2c94c;
        }

        .spin-btn:disabled {
            background: #555;
            cursor: not-allowed;
        }

        .result-area {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background: #222;
            border-left: 5px solid #d4af37;
            text-align: left;
        }

        .voucher-code {
            color: #00ffcc;
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 2px;
        }
    </style>
</head>

<body>

    <div class="giveaway-container">
        <h1 style="color: #d4af37;">QUAY SỐ MAY MẮN</h1>
        <p>Mỗi tài khoản chỉ được tham gia 1 lần duy nhất!</p>

        <div id="prize-box" class="prize-box">
            🎁 Nhấn nút để bắt đầu!
        </div>

        <button id="spin-btn" class="spin-btn">⚡ THỬ VẬN MAY</button>

        <div id="result-area" class="result-area">
            <h3 id="result-title"></h3>
            <p id="result-desc"></p>
        </div>
    </div>

    <script src="giveaway.js"></script>
</body>

</html>
